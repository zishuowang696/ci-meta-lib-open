header:
  version: 8
  includes:
    - configs/base.yaml

machine: raspberrypi3-64
distro: tinyai
target:
  - core-image-base

repos:
  meta-openrc:
    url: https://github.com/jsbronder/meta-openrc.git
    path: layers/meta-openrc
    refspec: 7bfd4cc

local_conf_header:
  # 一键 demo 脚本（llama-cpp 已由 tinyai distro 自动包含）
  tinyai-demo: |
    IMAGE_INSTALL:append = " tinyai-demo"

  # RPi 3B WiFi 支持（仅 base 镜像）
  wifi-support: |
    IMAGE_INSTALL:append:pn-core-image-base = " linux-firmware-bcm43430 wpa-supplicant"
    LICENSE_FLAGS_ACCEPTED += "synaptics-killswitch"

  # initramfs 配置
  initramfs-config: |
    INITRAMFS_IMAGE = "core-image-minimal-initramfs"
    INITRAMFS_IMAGE_BUNDLE = "0"
    IMAGE_FSTYPES:pn-core-image-minimal-initramfs = "cpio.gz"