header:
  version: 8
  includes:
    - configs/base.yaml

machine: raspberrypi3-64
distro: tinyai
target:
  - core-image-minimal

local_conf_header:
  # initramfs 配置
  initramfs-config: |
    INITRAMFS_IMAGE = "core-image-minimal-initramfs"
    INITRAMFS_IMAGE_BUNDLE = "0"
    IMAGE_FSTYPES:pn-core-image-minimal-initramfs = "cpio.gz"
