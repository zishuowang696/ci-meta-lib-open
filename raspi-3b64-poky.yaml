header:
  version: 8
  includes:
    - configs/base.yaml

machine: raspberrypi3-64
distro: poky
target:
  - core-image-minimal

local_conf_header:
  # initramfs 配置
  initramfs-config: |
    # 指定用于生成 initramfs 的镜像
    INITRAMFS_IMAGE = "core-image-minimal-initramfs"

    # 捆绑模式：将 initramfs 嵌入内核
    INITRAMFS_IMAGE_BUNDLE = "0"

    # 仅对 initramfs 覆盖 FSTYPES，避开 base.yaml 的 :append（防止产生多余 ext4/rpi-sdimg）
    IMAGE_FSTYPES:pn-core-image-minimal-initramfs = "cpio.gz"