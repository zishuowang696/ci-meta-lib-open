header:
  version: 8
  includes:
    - configs/base.yaml

machine: raspberrypi3-64
distro: poky
target:
  - core-image-minimal
  - core-image-base

local_conf_header:
  # 集成 llama-cpp (LLM 推理) + 一键 demo 脚本
  llama-cpp: |
    IMAGE_INSTALL:append = " llama-cpp tinyai-demo"

  # RPi 3B WiFi 支持（仅 base 镜像）
  wifi-support: |
    IMAGE_INSTALL:append:pn-core-image-base = " linux-firmware-bcm43430 wpa-supplicant"
    LICENSE_FLAGS_ACCEPTED += "synaptics-killswitch"

  # initramfs 配置
  initramfs-config: |
    INITRAMFS_IMAGE = "core-image-minimal-initramfs"
    INITRAMFS_IMAGE_BUNDLE = "0"
    IMAGE_FSTYPES:pn-core-image-minimal-initramfs = "cpio.gz"