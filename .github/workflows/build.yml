name: Build Yocto Image

on:
  # 推送到 main 分支时自动构建
  push:
    branches:
      - main
    paths:
      - '*.yaml'
      - '.github/workflows/build.yml'

  # 手动触发
  workflow_dispatch:
    inputs:
      config:
        description: '选择要构建的配置'
        required: true
        type: choice
        options:
          - 'all'
          - 'raspi-3b64-poky.yaml'
          - 'raspi-3b64-poky-tiny.yaml'
      create_release:
        description: '是否创建Release'
        required: true
        type: choice
        default: 'yes'
        options:
          - 'yes'
          - 'no'
      release_tag:
        description: 'Release tag (可选，留空自动生成)'
        required: false
        default: ''
        type: string

env:
  SCCACHE_DIR: ${{ github.workspace }}/.cache/sccache
  SCCACHE_CACHE_SIZE: 5G

jobs:
  detect-configs:
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.set-configs.outputs.configs }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Determine which configs to build
      id: set-configs
      run: |
        # push 事件自动构建所有配置，workflow_dispatch 使用选择的配置
        if [ "${{ github.event_name }}" = "push" ]; then
          CONFIGS=$(find . -maxdepth 1 -name "*.yaml" -type f | sed 's|^\.\/||' | sort | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "Push event: building all configs"
        else
          SELECTED="${{ github.event.inputs.config }}"
          echo "Selected config: $SELECTED"
          if [ "$SELECTED" = "all" ]; then
            CONFIGS=$(find . -maxdepth 1 -name "*.yaml" -type f | sed 's|^\.\/||' | sort | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            CONFIGS="[\"$SELECTED\"]"
          fi
        fi
        echo "configs=$CONFIGS" >> $GITHUB_OUTPUT
        echo "Building configs: $CONFIGS"

  build:
    needs: detect-configs
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config: ${{ fromJson(needs.detect-configs.outputs.configs) }}
      fail-fast: false
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Free disk space
      uses: jlumbroso/free-disk-space@main
      with:
        android: true

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.6

    - name: Cache Yocto sstate and downloads
      uses: actions/cache@v4
      with:
        path: |
          build/sstate-cache
          build/downloads
        key: yocto-${{ runner.os }}-${{ hashFiles(matrix.config) }}-${{ github.sha }}
        restore-keys: |
          yocto-${{ runner.os }}-${{ hashFiles(matrix.config) }}-
          yocto-${{ runner.os }}-

    - name: Enable user namespaces
      run: |
        sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
        echo "kernel.apparmor_restrict_unprivileged_userns=0" | sudo tee /etc/sysctl.d/99-userns.conf

    - name: Install kas and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y kas chrpath diffstat python3-websockets

    - name: Build with kas
      run: |
        kas build ${{ matrix.config }}
      env:
        SCCACHE_DIR: ${{ github.workspace }}/.cache/sccache
        SCCACHE_CACHE_SIZE: 5G

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-${{ matrix.config }}
        path: build/tmp/deploy/images/
        retention-days: 7

    - name: Show sccache stats
      run: sccache --show-stats || true

  release:
    needs: [build, detect-configs]
    runs-on: ubuntu-latest
    # push 事件自动创建 release，workflow_dispatch 根据用户选择
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'yes')
    permissions:
      contents: write
    strategy:
      matrix:
        config: ${{ fromJson(needs.detect-configs.outputs.configs) }}
      max-parallel: 1  # 串行上传避免冲突
      fail-fast: false
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download build artifacts for ${{ matrix.config }}
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts-${{ matrix.config }}
        path: artifacts

    - name: Prepare release assets
      id: prepare
      run: |
        mkdir -p release-assets
        config_name="${{ matrix.config }}"
        config_short="${config_name%.yaml}"

        echo "Processing artifacts for $config_name..."

        # 1. 根文件系统镜像 (rpi-sdimg, ext4, tar.gz) - 只保留不带版本号的
        find artifacts -type f \( -name "*.rpi-sdimg" -o -name "core-image-*.ext4" -o -name "core-image-*.tar.gz" \) \
          | grep -v '\-[0-9]\{8\}' \
          | while read f; do cp "$f" release-assets/${config_short}-$(basename "$f"); done

        # 2. 内核镜像 (Image, Image.gz) - 只保留不带版本号的
        find artifacts -type f \( -name "Image" -o -name "Image.gz" \) \
          | grep -v '\-[0-9]\{8\}' \
          | while read f; do cp "$f" release-assets/${config_short}-$(basename "$f"); done

        # 3. 设备树 (dtb) - 只保留不带版本号的主 dtb
        find artifacts -type f -name "*.dtb" \
          | grep -v '\-[0-9]\{8\}' \
          | grep -E 'bcm2710-rpi' \
          | grep -v 'rpi-2-b' \
          | grep 'raspberrypi3-64' \
          | while read f; do cp "$f" release-assets/${config_short}-$(basename "$f"); done

        # 4. dtbo - 只保留蓝牙和串口相关
        find artifacts -type f -name "*.dtbo" \
          | grep -v '\-[0-9]\{8\}' \
          | grep -E '(miniuart-bt|uart)' \
          | grep 'raspberrypi3-64' \
          | while read f; do cp "$f" release-assets/${config_short}-$(basename "$f"); done

        # 5. initramfs - 只保留不带版本号的
        find artifacts -type f -name "*.cpio.gz" \
          | grep -v '\-[0-9]\{8\}' \
          | while read f; do cp "$f" release-assets/${config_short}-$(basename "$f"); done

        # Show what we found
        echo "=== Release assets ==="
        ls -la release-assets/
        echo "asset_count=$(ls -1 release-assets/ 2>/dev/null | wc -l)" >> $GITHUB_OUTPUT

    - name: Determine release tag
      id: tag
      run: |
        config_name="${{ matrix.config }}"
        config_short="${config_name%.yaml}"
        timestamp=$(date +%Y%m%d-%H%M%S)

        # 为每个配置生成独立的 tag
        TAG="${config_short}-${timestamp}"
        echo "Release tag for $config_name: $TAG"
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "config_short=$config_short" >> $GITHUB_OUTPUT

    - name: Create Git tag
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git tag ${{ steps.tag.outputs.tag }}
        git push origin ${{ steps.tag.outputs.tag }}

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        name: Release ${{ steps.tag.outputs.config_short }} - ${{ steps.tag.outputs.tag }}
        generate_release_notes: true
        fail_on_unmatched_files: false
        files: release-assets/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}