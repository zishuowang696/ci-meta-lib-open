name: Build Yocto Image

on:
  # 推送到 main 分支时自动构建
  push:
    branches:
      - main
    paths:
      - 'configs/base.yaml'
      - 'raspi-3b64.yaml'
      - '.github/workflows/build.yml'

  # 手动触发
  workflow_dispatch:
    inputs:
      distro:
        description: '选择发行版'
        required: true
        type: choice
        options:
          - 'all'
          - 'poky'
          - 'poky-tiny'
      create_release:
        description: '是否创建Release'
        required: true
        type: choice
        default: 'yes'
        options:
          - 'yes'
          - 'no'
      release_tag:
        description: 'Release tag (可选，留空自动生成)'
        required: false
        default: ''
        type: string

jobs:
  detect-distros:
    runs-on: ubuntu-latest
    outputs:
      distros: ${{ steps.set-distros.outputs.distros }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Determine which distros to build
      id: set-distros
      run: |
        if [ "${{ github.event_name }}" = "push" ]; then
          DISTROS='["poky", "poky-tiny"]'
          echo "Push event: building all distros"
        else
          SELECTED="${{ github.event.inputs.distro }}"
          echo "Selected distro: $SELECTED"
          if [ "$SELECTED" = "all" ]; then
            DISTROS='["poky", "poky-tiny"]'
          else
            DISTROS="[\"$SELECTED\"]"
          fi
        fi
        echo "distros=$DISTROS" >> $GITHUB_OUTPUT
        echo "Building distros: $DISTROS"

  build:
    needs: detect-distros
    runs-on: ubuntu-latest
    strategy:
      matrix:
        distro: ${{ fromJson(needs.detect-distros.outputs.distros) }}
      fail-fast: false
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Free disk space
      uses: jlumbroso/free-disk-space@main
      with:
        android: true

    - name: Cache Yocto sstate and downloads
      uses: actions/cache@v4
      with:
        path: |
          build/sstate-cache
          build/downloads
        key: yocto-${{ runner.os }}-${{ matrix.distro }}-${{ hashFiles('configs/base.yaml', 'raspi-3b64.yaml') }}-${{ github.sha }}
        restore-keys: |
          yocto-${{ runner.os }}-${{ matrix.distro }}-${{ hashFiles('configs/base.yaml', 'raspi-3b64.yaml') }}-
          yocto-${{ runner.os }}-${{ matrix.distro }}-
          yocto-${{ runner.os }}-

    - name: Enable user namespaces
      run: |
        sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
        echo "kernel.apparmor_restrict_unprivileged_userns=0" | sudo tee /etc/sysctl.d/99-userns.conf

    - name: Install kas and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y kas chrpath diffstat python3-websockets

    - name: Build with kas
      run: |
        DISTRO=${{ matrix.distro }} kas build raspi-3b64.yaml

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-${{ matrix.distro }}
        path: build/tmp/deploy/images/
        retention-days: 7

  release:
    needs: [build, detect-distros]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'yes')
    permissions:
      contents: write
    strategy:
      matrix:
        distro: ${{ fromJson(needs.detect-distros.outputs.distros) }}
      max-parallel: 1
      fail-fast: false
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download build artifacts for ${{ matrix.distro }}
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts-${{ matrix.distro }}
        path: artifacts

    - name: Prepare release assets
      id: prepare
      run: |
        mkdir -p release-assets
        distro="${{ matrix.distro }}"
        prefix="raspi-3b64-${distro}"

        echo "Processing artifacts for ${distro}..."

        # 1. 根文件系统镜像
        find artifacts -type f \( -name "*.rpi-sdimg" -o -name "core-image-*.ext4" -o -name "core-image-*.tar.gz" \) \
          | grep -v '\-[0-9]\{8\}' \
          | while read f; do cp "$f" release-assets/${prefix}-$(basename "$f"); done

        # 2. 内核镜像
        find artifacts -type f \( -name "Image" -o -name "Image.gz" \) \
          | grep -v '\-[0-9]\{8\}' \
          | while read f; do cp "$f" release-assets/${prefix}-$(basename "$f"); done

        # 3. 设备树 (dtb)
        find artifacts -type f -name "*.dtb" \
          | grep -v '\-[0-9]\{8\}' \
          | grep -E 'bcm2710-rpi' \
          | grep -v 'rpi-2-b' \
          | grep 'raspberrypi3-64' \
          | while read f; do cp "$f" release-assets/${prefix}-$(basename "$f"); done

        # 4. dtbo
        find artifacts -type f -name "*.dtbo" \
          | grep -v '\-[0-9]\{8\}' \
          | grep -E '(miniuart-bt|uart)' \
          | grep 'raspberrypi3-64' \
          | while read f; do cp "$f" release-assets/${prefix}-$(basename "$f"); done

        # 5. initramfs
        find artifacts -type f -name "*.cpio.gz" \
          | grep -v '\-[0-9]\{8\}' \
          | while read f; do cp "$f" release-assets/${prefix}-$(basename "$f"); done

        echo "=== Release assets ==="
        ls -la release-assets/
        echo "asset_count=$(ls -1 release-assets/ 2>/dev/null | wc -l)" >> $GITHUB_OUTPUT

    - name: Determine release tag
      id: tag
      run: |
        distro="${{ matrix.distro }}"
        timestamp=$(date +%Y%m%d-%H%M%S)
        TAG="raspi-3b64-${distro}-${timestamp}"
        echo "Release tag: $TAG"
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "distro=$distro" >> $GITHUB_OUTPUT

    - name: Create Git tag
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git tag ${{ steps.tag.outputs.tag }}
        git push origin ${{ steps.tag.outputs.tag }}

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        name: Release raspi-3b64-${{ steps.tag.outputs.distro }} - ${{ steps.tag.outputs.tag }}
        generate_release_notes: true
        fail_on_unmatched_files: false
        files: release-assets/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}