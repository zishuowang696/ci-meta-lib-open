name: Build Yocto Image

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      config:
        description: '选择要构建的配置'
        required: true
        type: choice
        options:
          - 'all'
          - 'raspi-3b64-poky.yaml'
          - 'raspi-3b64-poky-tiny.yaml'

env:
  SCCACHE_DIR: ${{ github.workspace }}/.cache/sccache
  SCCACHE_CACHE_SIZE: 5G

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.detect.outputs.configs }}
      releases: ${{ steps.detect.outputs.releases }}
      should_build: ${{ steps.detect.outputs.should_build }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Detect version changes or manual trigger
      id: detect
      run: |
        # Install yq for YAML parsing
        sudo snap install yq

        CONFIGS="[]"
        RELEASES="[]"
        SHOULD_BUILD="false"

        # Handle manual dispatch
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          SELECTED="${{ github.event.inputs.config }}"
          echo "Manual trigger: selected config = $SELECTED"

          if [ "$SELECTED" = "all" ]; then
            YAML_FILES=$(find . -maxdepth 1 -name "*.yaml" -type f | sed 's|^\./||' | sort)
            for yaml_file in $YAML_FILES; do
              CONFIGS=$(echo "$CONFIGS" | jq --arg cfg "$yaml_file" '. + [$cfg]')
            done
          else
            CONFIGS=$(echo "$CONFIGS" | jq --arg cfg "$SELECTED" '. + [$cfg]')
          fi

          SHOULD_BUILD="true"
          echo "Manual build (no release): configs=$CONFIGS"

        else
          # Handle push/PR - only build if version changed
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            YAML_FILES=$(git diff --name-only origin/${{ github.base_ref }} HEAD -- '*.yaml' | grep -E '^[^/]+\.yaml$' || true)
          else
            YAML_FILES=$(git diff --name-only HEAD^ HEAD -- '*.yaml' | grep -E '^[^/]+\.yaml$' || true)
          fi

          echo "Changed YAML files: $YAML_FILES"

          for yaml_file in $YAML_FILES; do
            if [ ! -f "$yaml_file" ]; then
              echo "Warning: $yaml_file not found, skipping"
              continue
            fi

            CONFIG_NAME="${yaml_file%.yaml}"

            VERSION=$(yq '.env.KAS_RELEASE_VERSION // ""' "$yaml_file" 2>/dev/null || echo "")
            RELEASE_NAME=$(yq '.env.KAS_RELEASE_NAME // ""' "$yaml_file" 2>/dev/null || echo "")

            if [ -z "$VERSION" ]; then
              echo "No KAS_RELEASE_VERSION in $yaml_file, skipping"
              continue
            fi

            PREV_VERSION=""
            if git show HEAD^:"$yaml_file" >/dev/null 2>&1; then
              PREV_VERSION=$(git show HEAD^:"$yaml_file" | yq '.env.KAS_RELEASE_VERSION // ""' 2>/dev/null || echo "")
            fi

            echo "Config: $CONFIG_NAME"
            echo "Current version: $VERSION"
            echo "Previous version: $PREV_VERSION"

            if [ "$VERSION" != "$PREV_VERSION" ]; then
              echo "✅ Version changed! Will build and release"
              SHOULD_BUILD="true"
              CONFIGS=$(echo "$CONFIGS" | jq --arg cfg "$yaml_file" '. + [$cfg]')

              TAG_NAME="${CONFIG_NAME}-v${VERSION}"

              if git tag -l "$TAG_NAME" | grep -q "$TAG_NAME"; then
                echo "Warning: Tag $TAG_NAME already exists, skipping release"
              else
                NOTES_FILE=$(mktemp)
                yq '.env.KAS_RELEASE_NOTES // ""' "$yaml_file" > "$NOTES_FILE" 2>/dev/null || echo "" > "$NOTES_FILE"
                NOTES_CONTENT=$(cat "$NOTES_FILE")
                rm -f "$NOTES_FILE"

                META_EMBEDLAB_URL=$(yq '.repos.meta-embedlab.url // ""' "$yaml_file" 2>/dev/null || echo "")
                META_EMBEDLAB_BRANCH=$(yq '.repos.meta-embedlab.branch // "main"' "$yaml_file" 2>/dev/null || echo "main")

                # Find previous tag for this config
                PREV_TAG=$(git tag -l "${CONFIG_NAME}-v*" | sort -Vr | grep -v "$TAG_NAME" | head -n 1 || echo "")

                echo "Previous tag: $PREV_TAG"
                echo "Meta-embedlab URL: $META_EMBEDLAB_URL"

                RELEASES=$(echo "$RELEASES" | jq \
                  --arg cfg "$yaml_file" \
                  --arg tag "$TAG_NAME" \
                  --arg name "$RELEASE_NAME" \
                  --arg version "$VERSION" \
                  --arg notes "$NOTES_CONTENT" \
                  --arg prev_tag "$PREV_TAG" \
                  --arg meta_url "$META_EMBEDLAB_URL" \
                  '. + [{"config": $cfg, "tag": $tag, "name": $name, "version": $version, "notes": $notes, "prev_tag": $prev_tag, "meta_url": $meta_url}]')
              fi
            else
              echo "⏭️ Version unchanged, skipping build"
            fi
          done
        fi

        echo "configs=$CONFIGS" >> $GITHUB_OUTPUT
        echo "releases=$RELEASES" >> $GITHUB_OUTPUT
        echo "should_build=$SHOULD_BUILD" >> $GITHUB_OUTPUT
        echo "=== Summary ==="
        echo "Should build: $SHOULD_BUILD"
        echo "Configs: $CONFIGS"
        echo "Releases: $RELEASES"

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config: ${{ fromJson(needs.detect-changes.outputs.configs) }}
      fail-fast: false
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Free disk space
      uses: jlumbroso/free-disk-space@main
      with:
        android: true

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.6

    - name: Cache Yocto sstate and downloads
      uses: actions/cache@v4
      with:
        path: |
          build/sstate-cache
          build/downloads
        key: yocto-${{ runner.os }}-${{ hashFiles(matrix.config) }}-${{ github.sha }}
        restore-keys: |
          yocto-${{ runner.os }}-${{ hashFiles(matrix.config) }}-
          yocto-${{ runner.os }}-

    - name: Enable user namespaces
      run: |
        sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
        echo "kernel.apparmor_restrict_unprivileged_userns=0" | sudo tee /etc/sysctl.d/99-userns.conf

    - name: Install kas and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y kas chrpath diffstat python3-websockets

    - name: Checkout layers with kas
      run: |
        kas checkout ${{ matrix.config }}

    - name: Record meta-embedlab commit hash
      id: meta-commit
      run: |
        if [ -d "layers/meta-embedlab" ]; then
          META_COMMIT=$(cd layers/meta-embedlab && git rev-parse HEAD)
          echo "meta_commit=$META_COMMIT" >> $GITHUB_OUTPUT
          echo "Meta-embedlab commit: $META_COMMIT"
          # Save to file for artifact
          echo "$META_COMMIT" > build/meta-embedlab-commit.txt
        else
          echo "meta_commit=" >> $GITHUB_OUTPUT
          echo "Warning: layers/meta-embedlab not found"
        fi

    - name: Build with kas
      run: |
        kas build ${{ matrix.config }}
      env:
        SCCACHE_DIR: ${{ github.workspace }}/.cache/sccache
        SCCACHE_CACHE_SIZE: 5G

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-${{ matrix.config }}
        path: |
          build/tmp/deploy/images/
          build/meta-embedlab-commit.txt
        retention-days: 7

    - name: Show sccache stats
      run: sccache --show-stats || true

  release:
    needs: [build, detect-changes]
    if: needs.detect-changes.outputs.releases != '[]' && needs.detect-changes.outputs.releases != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download all build artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: build-artifacts-*
        merge-multiple: false

    - name: Create releases
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        RELEASES: ${{ needs.detect-changes.outputs.releases }}
      run: |
        echo "$RELEASES" | jq -c '.[]' | while read -r release; do
          CONFIG=$(echo "$release" | jq -r '.config')
          TAG=$(echo "$release" | jq -r '.tag')
          NAME=$(echo "$release" | jq -r '.name')
          VERSION=$(echo "$release" | jq -r '.version')
          NOTES=$(echo "$release" | jq -r '.notes')
          PREV_TAG=$(echo "$release" | jq -r '.prev_tag')
          META_URL=$(echo "$release" | jq -r '.meta_url')

          echo "=== Creating release for $CONFIG ==="
          echo "Tag: $TAG"
          echo "Name: $NAME"
          echo "Version: $VERSION"
          echo "Previous tag: $PREV_TAG"

          # Get current meta-embedlab commit from artifact
          ARTIFACT_DIR="artifacts/build-artifacts-$CONFIG"
          CURRENT_META_COMMIT=""
          META_COMMIT_FILE=""
          if [ -f "$ARTIFACT_DIR/build/meta-embedlab-commit.txt" ]; then
            CURRENT_META_COMMIT=$(cat "$ARTIFACT_DIR/build/meta-embedlab-commit.txt")
            META_COMMIT_FILE="$ARTIFACT_DIR/build/meta-embedlab-commit.txt"
            echo "Current meta-embedlab commit: $CURRENT_META_COMMIT"
          fi

          # Prepare release assets
          RELEASE_DIR="release-assets-$TAG"
          mkdir -p "$RELEASE_DIR"

          if [ -d "$ARTIFACT_DIR" ]; then
            echo "Processing artifacts from $ARTIFACT_DIR..."
            find "$ARTIFACT_DIR" -type f \( \
              -name "*.wic" -o -name "*.wic.xz" \
              -o -name "*.ext2" -o -name "*.ext2.xz" \
              -o -name "*.ext3" -o -name "*.ext3.xz" \
              -o -name "*.ext4" -o -name "*.ext4.xz" \
              -o -name "*.tar.xz" -o -name "*.tar.gz" \
              -o -name "*.zip" \
              -o -name "*.rpi-sdimg" -o -name "*.rpi-sdimg.xz" \
            \) -exec cp {} "$RELEASE_DIR/" \;

            find "$ARTIFACT_DIR" -type f -name "*.bmap" -exec cp {} "$RELEASE_DIR/" \;
            find "$ARTIFACT_DIR" -type f \( -name "*.dtb" -o -name "*.dtbo" \) -exec cp {} "$RELEASE_DIR/" \;
            find "$ARTIFACT_DIR" -type f \( \
              -name "zImage*" -o -name "Image*" -o -name "vmlinux*" -o -name "kernel*" \
            \) -exec cp {} "$RELEASE_DIR/" \;
            find "$ARTIFACT_DIR" -type f \( \
              -name "*.cpio.gz" -o -name "*.cpio*" -o -name "initramfs*" \
            \) -exec cp {} "$RELEASE_DIR/" \;
          fi

          echo "=== Release assets for $TAG ==="
          ls -la "$RELEASE_DIR/" || echo "No assets found"

          ASSET_COUNT=$(ls -1 "$RELEASE_DIR/" 2>/dev/null | wc -l)
          if [ "$ASSET_COUNT" -eq 0 ]; then
            echo "Warning: No assets found for $CONFIG"
            continue
          fi

          # Create release title
          if [ -n "$NAME" ]; then
            RELEASE_TITLE="$NAME v$VERSION"
          else
            CONFIG_TITLE=$(basename "$CONFIG" .yaml | sed 's/-/ /g' | sed 's/\b\(.\)/\u\1/g')
            RELEASE_TITLE="$CONFIG_TITLE v$VERSION"
          fi

          # Generate changelog from meta-embedlab
          CHANGELOG=""
          if [ -n "$META_URL" ] && [ "$META_URL" != "null" ] && [ -n "$CURRENT_META_COMMIT" ]; then
            echo "=== Generating changelog from meta-embedlab ==="
            
            # Get previous meta-embedlab commit from previous release
            PREV_META_COMMIT=""
            if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "null" ]; then
              # Try to get from previous release artifact (if stored as release asset)
              PREV_META_COMMIT=$(gh release view "$PREV_TAG" --json assets --jq '.assets[] | select(.name == "meta-embedlab-commit.txt") | .url' 2>/dev/null | head -1 || echo "")
              if [ -n "$PREV_META_COMMIT" ]; then
                PREV_META_COMMIT=$(curl -sL "$PREV_META_COMMIT" 2>/dev/null || echo "")
              fi
              
              # Alternative: check if we have a commit record file in the repo
              if [ -z "$PREV_META_COMMIT" ] && [ -f ".release-commits/${PREV_TAG}.txt" ]; then
                PREV_META_COMMIT=$(cat ".release-commits/${PREV_TAG}.txt" 2>/dev/null || echo "")
              fi
            fi
            
            echo "Previous meta-embedlab commit: $PREV_META_COMMIT"
            
            # Clone meta-embedlab to generate changelog
            if [ -n "$PREV_META_COMMIT" ] && [ "$PREV_META_COMMIT" != "$CURRENT_META_COMMIT" ]; then
              META_DIR=$(mktemp -d)
              git clone --depth=0 "$META_URL" "$META_DIR" 2>/dev/null
              
              if [ -d "$META_DIR/.git" ]; then
                cd "$META_DIR"
                CHANGELOG=$(git log --pretty=format:"- %s (%h)" "$PREV_META_COMMIT..$CURRENT_META_COMMIT" 2>/dev/null || echo "")
                cd "$GITHUB_WORKSPACE"
              fi
              rm -rf "$META_DIR"
              
              echo "Changelog generated:"
              echo "$CHANGELOG"
            elif [ -z "$PREV_META_COMMIT" ]; then
              echo "No previous commit found, this is the first release"
              # For first release, show recent commits
              META_DIR=$(mktemp -d)
              git clone --depth=50 "$META_URL" "$META_DIR" 2>/dev/null
              
              if [ -d "$META_DIR/.git" ]; then
                cd "$META_DIR"
                CHANGELOG=$(git log --pretty=format:"- %s (%h)" -n 20 2>/dev/null || echo "")
                cd "$GITHUB_WORKSPACE"
              fi
              rm -rf "$META_DIR"
            fi
          fi

          # Prepare release notes file
          NOTES_FILE=$(mktemp)
          
          if [ -n "$NOTES" ] && [ "$NOTES" != "null" ]; then
            echo "$NOTES" > "$NOTES_FILE"
          fi
          
          # Add changelog section
          if [ -n "$CHANGELOG" ]; then
            echo "" >> "$NOTES_FILE"
            echo "## meta-embedlab 变更日志" >> "$NOTES_FILE"
            echo "$CHANGELOG" >> "$NOTES_FILE"
          fi

          # Save meta-embedlab commit for future releases
          mkdir -p .release-commits
          echo "$CURRENT_META_COMMIT" > ".release-commits/${TAG}.txt"

          # Create and push tag
          git tag "$TAG" 2>/dev/null || echo "Tag $TAG already exists locally"
          git push origin "$TAG" 2>/dev/null || echo "Tag $TAG already exists remotely"

          # Create GitHub release
          echo "Creating GitHub release: $RELEASE_TITLE"
          
          # Prepare assets list
          ASSETS="${RELEASE_DIR}/*"
          if [ -n "$META_COMMIT_FILE" ] && [ -f "$META_COMMIT_FILE" ]; then
            ASSETS="$ASSETS $META_COMMIT_FILE"
          fi
          
          if [ -s "$NOTES_FILE" ]; then
            gh release create "$TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file "$NOTES_FILE" \
              --target ${{ github.sha }} \
              $ASSETS
          else
            gh release create "$TAG" \
              --title "$RELEASE_TITLE" \
              --generate-notes \
              --target ${{ github.sha }} \
              $ASSETS
          fi
          rm -f "$NOTES_FILE"

          echo "✅ Release $TAG created successfully"
        done