name: Build Yocto Image

on:
  push:
    branches:
      - main
    paths:
      - 'configs/base.yaml'
      - 'raspi-3b64-tinyai.yaml'
      - 'raspi-3b64-tinyai-kernel.yaml'
      - '.github/workflows/build.yml'

  workflow_dispatch:
    inputs:
      create_release:
        description: '是否创建Release'
        required: true
        type: choice
        default: 'yes'
        options:
          - 'yes'
          - 'no'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Free disk space
      uses: jlumbroso/free-disk-space@main
      with:
        android: true

    - name: Cache Yocto downloads
      uses: actions/cache@v4
      with:
        save-always: true
        path: build/downloads
        key: yocto-downloads-v1-${{ runner.os }}

    - name: Cache Yocto sstate
      uses: actions/cache@v4
      with:
        save-always: true
        path: build/sstate-cache
        key: yocto-sstate-v1-${{ runner.os }}-tinyai
        restore-keys: |
          yocto-sstate-v1-${{ runner.os }}-

    - name: Enable user namespaces
      run: |
        sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
        echo "kernel.apparmor_restrict_unprivileged_userns=0" | sudo tee /etc/sysctl.d/99-userns.conf

    - name: Install kas and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y kas chrpath diffstat python3-websockets

    - name: Build kernel (heaviest component — reused by full image via sstate)
      run: kas build raspi-3b64-tinyai-kernel.yaml

    - name: Free disk — remove kernel build temp (keep sstate-cache and downloads)
      run: |
        rm -rf build/tmp
        echo "--- disk after cleanup ---"
        df -h /

    - name: Build full image
      run: kas build raspi-3b64-tinyai.yaml

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: build/tmp/deploy/images/
        retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'yes')
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: artifacts

    - name: Prepare release assets
      id: prepare
      run: |
        mkdir -p release-assets

        # 根文件系统镜像
        find artifacts -type f \( -name "*.rpi-sdimg" -o -name "core-image-*.ext4" -o -name "core-image-*.tar.gz" \) \
          | grep -v '\-[0-9]\{8\}' \
          | while read f; do cp "$f" release-assets/$(basename "$f"); done

        # 内核镜像
        find artifacts -type f \( -name "Image" -o -name "Image.gz" \) \
          | grep -v '\-[0-9]\{8\}' \
          | while read f; do cp "$f" release-assets/$(basename "$f"); done

        # 设备树（去重：排除带 -raspberrypi3-64 后缀的 symlink）
        find artifacts -type f -name "*.dtb" \
          | grep -v '\-[0-9]\{8\}' \
          | grep -E 'bcm2710-rpi' \
          | grep -v 'rpi-2-b' \
          | grep 'raspberrypi3-64' \
          | grep -v '\-raspberrypi3-64\.dtb$' \
          | while read f; do cp "$f" release-assets/$(basename "$f"); done

        # dtbo（去重）
        find artifacts -type f -name "*.dtbo" \
          | grep -v '\-[0-9]\{8\}' \
          | grep -E '(disable-bt|miniuart-bt|pi3-miniuart-bt)' \
          | grep 'raspberrypi3-64' \
          | grep -v '\-raspberrypi3-64\.dtbo$' \
          | while read f; do cp "$f" release-assets/$(basename "$f"); done

        # initramfs
        find artifacts -type f -name "*.cpio.gz" \
          | grep -v '\-[0-9]\{8\}' \
          | while read f; do cp "$f" release-assets/$(basename "$f"); done

        echo "asset_count=$(ls -1 release-assets/ 2>/dev/null | wc -l)" >> $GITHUB_OUTPUT

    - name: Create release tag
      id: tag
      run: |
        timestamp=$(date +%Y%m%d-%H%M%S)
        echo "tag=tinyai-${timestamp}" >> $GITHUB_OUTPUT

    - name: Create Git tag
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git tag "${{ steps.tag.outputs.tag }}"
        git push origin "${{ steps.tag.outputs.tag }}"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        name: Release TinyAI - ${{ steps.tag.outputs.tag }}
        generate_release_notes: true
        fail_on_unmatched_files: false
        files: release-assets/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
