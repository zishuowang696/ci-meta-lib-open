header:
  version: 8

# 公共 repos 配置（所有构建共享）
repos:
  # BitBake 构建引擎
  bitbake:
    url: https://git.openembedded.org/bitbake
    path: layers/bitbake
    refspec: yocto-6.0_M3
    layers:
      bitbake: disabled

  # OpenEmbedded 核心层
  openembedded-core:
    url: https://git.openembedded.org/openembedded-core
    path: layers/openembedded-core
    refspec: yocto-6.0_M3
    layers:
      meta:

  # meta-yocto 层（提供 poky/poky-tiny 发行版配置）
  meta-yocto:
    url: https://git.yoctoproject.org/meta-yocto
    path: layers/meta-yocto
    refspec: yocto-6.0_M3
    layers:
      meta-poky:
      meta-yocto-bsp: disabled

  # 树莓派硬件层
  meta-raspberrypi:
    url: https://github.com/agherzan/meta-raspberrypi.git
    path: layers/meta-raspberrypi
    refspec: b83766291188efb956c475b09c9666c2dfe2cb69

  # TinyAi 自定义层
  meta-TinyAi:
    url: https://github.com/zishuowang696/meta-TinyAi.git
    path: layers/meta-TinyAi
    branch: main

bblayers_conf_header:
  standard: |
    POKY_BBLAYERS_CONF_VERSION = "2"
    BBPATH = "${TOPDIR}"
    BBFILES ?= ""

# 公共 local.conf 配置
local_conf_header:
  # CI 详细输出
  verbose-output: |
    BB_VERBOSE_LOGS = "1"

  # 磁盘空间优化
  reduce-diskspace: |
    INHERIT += "rm_work_and_downloads"

  # 基础配置
  standard: |
    CONF_VERSION = "2"
    PACKAGE_CLASSES = "package_ipk"
    SDKMACHINE = "x86_64"
    USER_CLASSES = "buildstats"
    PATCHRESOLVE = "noop"

  # 调试配置（无密码root自动登录）
  debug-access: |
    IMAGE_FEATURES += "empty-root-password allow-empty-password allow-root-login serial-autologin-root"
    IMAGE_FEATURES:pn-core-image-minimal-initramfs = "empty-root-password allow-empty-password allow-root-login"

  # 树莓派配置
  rpi-config: |
    IMAGE_FSTYPES:append = " rpi-sdimg tar.gz ext4"
    ENABLE_UART = "1"
    KERNEL_MODULE_AUTOLOAD:append = " dwc2 usbnet smsc95xx"

  # 压缩内核镜像
  kernel-compressed: |
    KERNEL_IMAGETYPES += "Image.gz"

  # 多串口终端配置
  serial-console: |
    SERIAL_CONSOLES = "115200;ttyAMA0 115200;ttyS0"

  # 内核配置
  kernel-config: |
    PREFERRED_PROVIDER_virtual/kernel:raspberrypi3-64 = "linux-raspberrypi"
    PREFERRED_VERSION_linux-raspberrypi = "6.6%"

  # 磁盘监控
  diskmon: |
    BB_DISKMON_DIRS = "\
        STOPTASKS,${TMPDIR},1G,100K \
        STOPTASKS,${DL_DIR},1G,100K \
        STOPTASKS,${SSTATE_DIR},1G,100K \
        STOPTASKS,/tmp,100M,100K \
        HALT,${TMPDIR},100M,1K \
        HALT,${DL_DIR},100M,1K \
        HALT,${SSTATE_DIR},100M,1K \
        HALT,/tmp,10M,1K"